<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Cards — TipsTap</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23FF6B35'/><text x='50' y='70' font-size='52' text-anchor='middle' fill='white' font-family='system-ui' font-weight='800'>T</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-system.css">
  <script>
    (function(){
      var t = localStorage.getItem('tipstap-theme') ||
        (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    body { min-height: 100dvh; }

    /* ===== HEADER ===== */
    .header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 0 24px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-email { font-size: 13px; color: var(--color-text-secondary); }
    .btn-logout {
      background: none; border: 1px solid var(--color-border); border-radius: var(--radius-xs);
      padding: 6px 14px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer;
      transition: all var(--duration);
    }
    .btn-logout:hover { border-color: var(--color-error); color: var(--color-error); }

    /* ===== MAIN ===== */
    .main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    .page-title {
      font-size: 28px; font-weight: 800; margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .page-subtitle { color: var(--color-text-secondary); font-size: 15px; margin-bottom: 32px; }

    /* ===== CARDS GRID ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card-item {
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all var(--duration);
    }
    .card-item:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .card-media {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: var(--color-surface-inset);
    }
    .card-media-video {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: #000;
    }
    .card-body { padding: 16px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .card-price { font-size: 22px; font-weight: 800; color: var(--brand); margin-bottom: 12px; }
    /* Stats row */
    .card-stats {
      display: flex; gap: 16px; margin-bottom: 12px;
      font-size: 13px; color: var(--color-text-secondary);
    }
    .card-stat {
      display: flex; align-items: center; gap: 4px;
    }
    .card-stat svg { width: 14px; height: 14px; flex-shrink: 0; }
    .card-stat strong { color: var(--color-text); font-weight: 700; }

    .card-actions { display: flex; gap: 8px; }
    .card-actions button {
      flex: 1; padding: 8px; border-radius: var(--radius-xs); font-size: 13px;
      font-weight: 600; cursor: pointer; border: none; transition: all var(--duration);
    }
    .btn-copy {
      background: var(--brand); color: white;
    }
    .btn-copy:hover { background: var(--brand-hover); }
    .btn-edit {
      background: var(--color-info-light); color: var(--color-info);
      border: 1px solid transparent !important;
    }
    .btn-edit:hover { background: var(--color-info); color: white; }
    .btn-delete {
      background: var(--color-surface-inset); color: var(--color-text-secondary);
      border: 1px solid var(--color-border) !important;
    }
    .btn-delete:hover { background: var(--color-error-light); color: var(--color-error); border-color: var(--color-error) !important; }

    /* ===== NEW CARD BUTTON ===== */
    .new-card-btn {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 280px; cursor: pointer;
      background: var(--color-surface-subtle);
      transition: all var(--duration);
      color: var(--color-text-secondary);
      gap: 8px;
    }
    .new-card-btn:hover {
      border-color: var(--brand); color: var(--brand);
      background: var(--brand-subtle);
    }
    .new-card-btn svg { width: 40px; height: 40px; }
    .new-card-btn span { font-size: 15px; font-weight: 600; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: var(--color-overlay);
      z-index: 100; display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 480px;
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border: none; background: var(--color-surface-inset);
      border-radius: var(--radius-xs); cursor: pointer; font-size: 18px;
      color: var(--color-text-secondary); display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--color-error-light); color: var(--color-error); }
    .modal-body { padding: 24px; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      margin-bottom: 6px; color: var(--color-text-secondary);
    }
    .form-group input, .form-group select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--color-border);
      border-radius: var(--radius-xs); font-size: 15px; background: var(--color-surface);
      color: var(--color-text); font-family: var(--font);
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow);
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius);
      padding: 32px; text-align: center;
      cursor: pointer; transition: all var(--duration);
      background: var(--color-surface-subtle);
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--brand); background: var(--brand-subtle);
    }
    .upload-zone svg { width: 40px; height: 40px; color: var(--color-text-tertiary); margin: 0 auto 8px; }
    .upload-zone p { font-size: 14px; color: var(--color-text-secondary); }
    .upload-zone .hint { font-size: 12px; color: var(--color-text-tertiary); margin-top: 4px; }
    .upload-zone.has-file { border-style: solid; border-color: var(--color-success); }
    .upload-zone.has-file p { color: var(--color-success); font-weight: 600; }

    .upload-preview {
      margin-top: 12px; border-radius: var(--radius-xs); overflow: hidden;
      max-height: 200px; display: none;
    }
    .upload-preview img, .upload-preview video {
      width: 100%; max-height: 200px; object-fit: cover;
    }

    /* Avatar upload */
    .avatar-upload {
      display: flex; align-items: center; gap: 14px;
    }
    .avatar-preview {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--color-surface-inset); border: 2px solid var(--color-border);
      overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-tertiary);
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-preview svg { width: 24px; height: 24px; }
    .avatar-upload-btn {
      padding: 8px 16px; border: 1px solid var(--color-border); border-radius: var(--radius-xs);
      background: var(--color-surface); color: var(--color-text-secondary); font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all var(--duration);
    }
    .avatar-upload-btn:hover { border-color: var(--brand); color: var(--brand); }

    /* Slug preview */
    .slug-preview {
      font-size: 12px; color: var(--color-text-tertiary); margin-top: 4px;
    }
    .slug-preview span { color: var(--brand); font-weight: 600; }

    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--color-border);
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .btn-cancel {
      padding: 10px 20px; border: 1px solid var(--color-border); border-radius: var(--radius-xs);
      background: var(--color-surface); color: var(--color-text); font-size: 14px;
      font-weight: 600; cursor: pointer;
    }
    .btn-create {
      padding: 10px 24px; border: none; border-radius: var(--radius-xs);
      background: var(--brand); color: white; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: all var(--duration);
    }
    .btn-create:hover { background: var(--brand-hover); }
    .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center; padding: 60px 24px;
      color: var(--color-text-secondary);
    }
    .empty-state svg { width: 64px; height: 64px; color: var(--color-text-tertiary); margin: 0 auto 16px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--color-text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; max-width: 360px; margin: 0 auto; }

    /* ===== LOADING ===== */
    #pageLoading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; color: var(--color-text-tertiary);
    }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--color-border);
      border-top-color: var(--brand); border-radius: 50%;
      animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: 1fr; gap: 16px; }
      .page-title { font-size: 22px; }
      .page-subtitle { font-size: 14px; margin-bottom: 24px; }
      .main { padding: 24px 16px; }

      /* Header mobile */
      .header { padding: 0 16px; }
      .header-inner { height: 54px; }
      .header-email { display: none; }
      .btn-logout { padding: 6px 12px; font-size: 12px; }

      /* Cards */
      .card-item { border-radius: var(--radius-sm); }
      .card-body { padding: 14px; }
      .card-actions button { padding: 12px; font-size: 14px; }
      .new-card-btn { min-height: 200px; border-radius: var(--radius-sm); }

      /* Modal fullscreen on mobile */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal {
        max-width: 100%; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        max-height: 92dvh;
        display: flex; flex-direction: column;
      }
      .modal-body {
        overflow-y: auto; -webkit-overflow-scrolling: touch;
        flex: 1; padding: 20px 16px;
      }
      .modal-header { padding: 16px; }
      .modal-footer { padding: 14px 16px calc(14px + env(safe-area-inset-bottom)); }
      .form-group input, .form-group select { font-size: 16px; padding: 12px 14px; }
      .upload-zone { padding: 24px; }
      .btn-create, .btn-cancel { padding: 12px 20px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo-wordmark">Tips<span>Tap</span></div>
      <div class="header-right">
        <span class="header-email" id="headerUser"></span>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="btn-logout" onclick="logout()">Log out</button>
      </div>
    </div>
  </header>

  <!-- LOADING -->
  <div id="pageLoading"><div class="spinner"></div></div>

  <!-- MAIN -->
  <div class="main" id="mainContent" style="display:none;">
    <h1 class="page-title">My Cards</h1>
    <p class="page-subtitle">Create exclusive content, share the link, get paid.</p>

    <div class="cards-grid" id="cardsGrid">
      <!-- Cards rendered here -->
    </div>
  </div>

  <!-- CREATE CARD MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>New Card</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Photo or Video</label>
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg>
            <p>Click or drag a file</p>
            <span class="hint">JPG, PNG, MP4, MOV — max 50 MB</span>
          </div>
          <div class="upload-preview" id="uploadPreview"></div>
          <input type="file" id="fileInput" accept="image/*,video/*" style="display:none" onchange="handleFileSelect(this)">
        </div>
        <div class="form-group">
          <label>Profile picture (optional)</label>
          <div class="avatar-upload">
            <div class="avatar-preview" id="avatarPreview">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <button type="button" class="avatar-upload-btn" onclick="document.getElementById('avatarInput').click()">Choose a photo</button>
          </div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatarSelect(this)">
        </div>
        <div class="form-group">
          <label for="cardTitle">Title (optional)</label>
          <input type="text" id="cardTitle" placeholder="e.g. Exclusive photo, Behind the scenes...">
        </div>
        <div class="form-group">
          <label for="cardPrice">Price (€)</label>
          <input type="number" id="cardPrice" min="1" max="999" step="0.5" value="5" placeholder="5">
        </div>
        <div class="form-group">
          <label for="cardSlug">Custom link</label>
          <input type="text" id="cardSlug" placeholder="my-vip-content" oninput="updateSlugPreview()">
          <div class="slug-preview" id="slugPreview">Link: <span id="slugUrl"></span></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-create" id="btnCreate" onclick="createCard()">Create card</button>
      </div>
    </div>
  </div>

  <!-- EDIT CARD MODAL -->
  <div class="modal-overlay" id="editModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit card</h2>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Photo or Video</label>
          <div class="upload-zone" id="editUploadZone" onclick="document.getElementById('editFileInput').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg>
            <p>Click to change media</p>
            <span class="hint">Leave empty to keep current</span>
          </div>
          <div class="upload-preview" id="editUploadPreview"></div>
          <input type="file" id="editFileInput" accept="image/*,video/*" style="display:none" onchange="handleEditFileSelect(this)">
        </div>
        <div class="form-group">
          <label>Profile picture</label>
          <div class="avatar-upload">
            <div class="avatar-preview" id="editAvatarPreview">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <button type="button" class="avatar-upload-btn" onclick="document.getElementById('editAvatarInput').click()">Change photo</button>
          </div>
          <input type="file" id="editAvatarInput" accept="image/*" style="display:none" onchange="handleEditAvatarSelect(this)">
        </div>
        <div class="form-group">
          <label for="editCardTitle">Title</label>
          <input type="text" id="editCardTitle" placeholder="Ex: Photo exclusive...">
        </div>
        <div class="form-group">
          <label for="editCardPrice">Price (€)</label>
          <input type="number" id="editCardPrice" min="1" max="999" step="0.5" placeholder="5">
        </div>
        <div class="form-group">
          <label for="editCardSlug">Custom link</label>
          <input type="text" id="editCardSlug" placeholder="my-vip-content" oninput="updateEditSlugPreview()">
          <div class="slug-preview">Link: <span id="editSlugUrl"></span></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn-create" id="btnSaveEdit" onclick="saveEditCard()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://iuzylqpixymphydjmkeo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1enlscXBpeHltcGh5ZGpta2VvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0OTg5NzEsImV4cCI6MjA4NzA3NDk3MX0.eIpFzw9w5qTQSixdw7_02fQLnsaz-DSa7dc74kfIE6o';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let cards = [];
    let selectedFile = null;
    let selectedAvatar = null;

    // ========== THEME ==========
    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('tipstap-theme', next);
    }

    // ========== AUTH ==========
    async function init() {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = '/index.html'; return; }
        currentUser = session.user;
      } catch (err) {
        console.error('Session check failed:', err);
        window.location.href = '/index.html';
        return;
      }
      document.getElementById('headerUser').textContent = currentUser.email;
      await loadCards();
      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      renderCards();
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.href = '/index.html';
    }

    // ========== LOAD CARDS ==========
    async function loadCards() {
      const { data, error } = await sb.from('cards').select('*').eq('owner_id', currentUser.id).order('created_at', { ascending: false });
      if (error) { console.error('Cards load error:', error); return; }
      cards = data || [];
    }

    // ========== RENDER ==========
    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      let html = '';

      // New card button always first
      html += `
        <div class="new-card-btn" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span>New card</span>
        </div>
      `;

      if (cards.length === 0) {
        grid.innerHTML = html;
        return;
      }

      cards.forEach(card => {
        const priceEur = (card.price / 100).toFixed(2).replace('.', ',');
        const mediaHtml = card.media_type === 'video'
          ? `<video class="card-media-video" src="${escapeHtml(card.media_url)}" muted></video>`
          : `<img class="card-media" src="${escapeHtml(card.media_url)}" alt="">`;
        const avatarHtml = card.avatar_url
          ? `<img src="${escapeHtml(card.avatar_url)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid var(--color-border);" alt="">`
          : '';
        const views = card.views || 0;
        const clicks = card.clicks || 0;

        html += `
          <div class="card-item">
            ${mediaHtml}
            <div class="card-body">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                ${avatarHtml}
                <div class="card-title">${card.title ? escapeHtml(card.title) : 'Untitled'}</div>
              </div>
              <div class="card-price">${priceEur} €</div>
              <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:10px;word-break:break-all;">/c/${escapeHtml(card.slug)}</div>
              <div class="card-stats">
                <span class="card-stat">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <strong>${views}</strong> views
                </span>
                <span class="card-stat">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/></svg>
                  <strong>${clicks}</strong> clicks
                </span>
              </div>
              <div class="card-actions">
                <button class="btn-copy" onclick="copyLink('${escapeHtml(card.slug)}')">Copy</button>
                <button class="btn-edit" onclick="openEditModal('${card.id}')">Edit</button>
                <button class="btn-delete" onclick="deleteCard('${card.id}')">Delete</button>
              </div>
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // ========== MODAL ==========
    function openModal() {
      selectedFile = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('cardTitle').value = '';
      document.getElementById('cardPrice').value = '5';
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('uploadPreview').innerHTML = '';
      document.getElementById('uploadZone').classList.remove('has-file');
      document.getElementById('uploadZone').querySelector('p').textContent = 'Click or drag a file';
      document.getElementById('btnCreate').disabled = false;
      document.getElementById('btnCreate').textContent = 'Create card';
      // Reset avatar
      selectedAvatar = null;
      document.getElementById('avatarInput').value = '';
      document.getElementById('avatarPreview').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
      // Reset slug
      document.getElementById('cardSlug').value = '';
      updateSlugPreview();
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // ========== FILE HANDLING ==========
    function handleFileSelect(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 50 * 1024 * 1024) {
        showToast('File too large (max 50 MB)', 'error');
        return;
      }
      selectedFile = file;
      const zone = document.getElementById('uploadZone');
      zone.classList.add('has-file');
      zone.querySelector('p').textContent = file.name;

      const preview = document.getElementById('uploadPreview');
      preview.innerHTML = '';
      preview.style.display = 'block';

      if (file.type.startsWith('video/')) {
        const vid = document.createElement('video');
        vid.src = URL.createObjectURL(file);
        vid.muted = true; vid.autoplay = true; vid.loop = true; vid.playsInline = true;
        preview.appendChild(vid);
      } else {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
      }
    }

    // Drag & drop
    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && (file.type.startsWith('image/') || file.type.startsWith('video/'))) {
        const input = document.getElementById('fileInput');
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        handleFileSelect(input);
      }
    });

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    // ========== AVATAR HANDLING ==========
    function handleAvatarSelect(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        showToast('Profile picture too large (max 5 MB)', 'error');
        return;
      }
      selectedAvatar = file;
      const preview = document.getElementById('avatarPreview');
      preview.innerHTML = '<img src="' + URL.createObjectURL(file) + '" alt="">';
    }

    // ========== SLUG PREVIEW ==========
    function updateSlugPreview() {
      const raw = document.getElementById('cardSlug').value.trim();
      const slug = sanitizeSlug(raw) || '...';
      document.getElementById('slugUrl').textContent = window.location.origin + '/c/' + slug;
    }

    function sanitizeSlug(str) {
      return str.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9-]/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    // ========== CREATE CARD ==========
    async function createCard() {
      if (!selectedFile) return showToast('Add a photo or video', 'error');

      const price = Math.round(parseFloat(document.getElementById('cardPrice').value) * 100);
      if (!price || price < 100) return showToast('Minimum price: €1', 'error');

      // Slug: custom or random
      const rawSlug = document.getElementById('cardSlug').value.trim();
      let slug = rawSlug ? sanitizeSlug(rawSlug) : generateSlug();
      if (!slug) return showToast('Invalid custom link', 'error');

      // Check uniqueness
      const { data: existing } = await sb.from('cards').select('id').eq('slug', slug).maybeSingle();
      if (existing) {
        if (rawSlug) return showToast('This link is already taken', 'error');
        slug = generateSlug(); // retry with new random
      }

      const btn = document.getElementById('btnCreate');
      btn.disabled = true;
      btn.textContent = 'Uploading...';

      try {
        // 1. Upload media
        const ext = selectedFile.name.split('.').pop().toLowerCase();
        const mediaType = selectedFile.type.startsWith('video/') ? 'video' : 'image';
        const filePath = currentUser.id + '/' + Date.now() + '.' + ext;

        const { error: uploadErr } = await sb.storage.from('media').upload(filePath, selectedFile, {
          cacheControl: '3600',
          upsert: false
        });
        if (uploadErr) throw uploadErr;

        const { data: urlData } = sb.storage.from('media').getPublicUrl(filePath);
        const mediaUrl = urlData.publicUrl;

        // 2. Upload avatar if provided
        let avatarUrl = null;
        if (selectedAvatar) {
          const avatarExt = selectedAvatar.name.split('.').pop().toLowerCase();
          const avatarPath = currentUser.id + '/avatar-' + Date.now() + '.' + avatarExt;
          const { error: avatarErr } = await sb.storage.from('media').upload(avatarPath, selectedAvatar, {
            cacheControl: '3600',
            upsert: false
          });
          if (avatarErr) throw avatarErr;
          const { data: avatarData } = sb.storage.from('media').getPublicUrl(avatarPath);
          avatarUrl = avatarData.publicUrl;
        }

        // 3. Insert card
        const title = document.getElementById('cardTitle').value.trim() || null;
        const { error: insertErr } = await sb.from('cards').insert({
          media_url: mediaUrl,
          media_type: mediaType,
          price: price,
          slug: slug,
          title: title,
          avatar_url: avatarUrl
        });
        if (insertErr) throw insertErr;

        closeModal();
        showToast('Card created!', 'success');
        await loadCards();
        renderCards();
      } catch (err) {
        console.error('Create card error:', err);
        showToast('Error: ' + (err.message || 'Creation failed'), 'error');
        btn.disabled = false;
        btn.textContent = 'Create card';
      }
    }

    // ========== DELETE CARD ==========
    async function deleteCard(id) {
      if (!confirm('Delete this card?')) return;
      const { error } = await sb.from('cards').delete().eq('id', id);
      if (error) { showToast('Delete error', 'error'); return; }
      showToast('Card deleted', 'success');
      await loadCards();
      renderCards();
    }

    // ========== COPY LINK ==========
    function copyLink(slug) {
      const url = window.location.origin + '/c/' + encodeURIComponent(slug);
      navigator.clipboard.writeText(url).then(() => {
        showToast('Link copied!', 'success');
      });
    }

    // ========== UTILS ==========
    function generateSlug() {
      const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
      const ts = Date.now().toString(36);
      let r = '';
      for (let i = 0; i < 6; i++) r += chars[Math.floor(Math.random() * chars.length)];
      return ts + r;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast visible ' + type;
      setTimeout(() => t.classList.remove('visible'), 3000);
    }

    // ========== EDIT CARD ==========
    let editingCard = null;
    let editSelectedFile = null;
    let editSelectedAvatar = null;

    function openEditModal(cardId) {
      editingCard = cards.find(c => c.id === cardId);
      if (!editingCard) return;

      editSelectedFile = null;
      editSelectedAvatar = null;
      document.getElementById('editFileInput').value = '';
      document.getElementById('editAvatarInput').value = '';
      document.getElementById('btnSaveEdit').disabled = false;
      document.getElementById('btnSaveEdit').textContent = 'Save';

      // Pre-fill fields
      document.getElementById('editCardTitle').value = editingCard.title || '';
      document.getElementById('editCardPrice').value = (editingCard.price / 100).toString();
      document.getElementById('editCardSlug').value = editingCard.slug || '';
      updateEditSlugPreview();

      // Show current media preview
      const preview = document.getElementById('editUploadPreview');
      if (editingCard.media_type === 'video') {
        preview.innerHTML = '<video src="' + escapeHtml(editingCard.media_url) + '" muted autoplay loop playsinline style="width:100%;max-height:200px;object-fit:cover;"></video>';
      } else {
        preview.innerHTML = '<img src="' + escapeHtml(editingCard.media_url) + '" style="width:100%;max-height:200px;object-fit:cover;" alt="">';
      }
      preview.style.display = 'block';
      const zone = document.getElementById('editUploadZone');
      zone.classList.add('has-file');
      zone.querySelector('p').textContent = 'Current media';

      // Show current avatar
      const avatarPreview = document.getElementById('editAvatarPreview');
      if (editingCard.avatar_url) {
        avatarPreview.innerHTML = '<img src="' + escapeHtml(editingCard.avatar_url) + '" alt="">';
      } else {
        avatarPreview.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
      }

      document.getElementById('editModalOverlay').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editModalOverlay').classList.remove('active');
      editingCard = null;
    }

    // Close on overlay click
    document.getElementById('editModalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeEditModal();
    });

    function handleEditFileSelect(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 50 * 1024 * 1024) { showToast('File too large (max 50 MB)', 'error'); return; }
      editSelectedFile = file;
      const zone = document.getElementById('editUploadZone');
      zone.classList.add('has-file');
      zone.querySelector('p').textContent = file.name;
      const preview = document.getElementById('editUploadPreview');
      preview.style.display = 'block';
      if (file.type.startsWith('video/')) {
        preview.innerHTML = '<video src="' + URL.createObjectURL(file) + '" muted autoplay loop playsinline style="width:100%;max-height:200px;object-fit:cover;"></video>';
      } else {
        preview.innerHTML = '<img src="' + URL.createObjectURL(file) + '" style="width:100%;max-height:200px;object-fit:cover;" alt="">';
      }
    }

    function handleEditAvatarSelect(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { showToast('Photo too large (max 5 MB)', 'error'); return; }
      editSelectedAvatar = file;
      document.getElementById('editAvatarPreview').innerHTML = '<img src="' + URL.createObjectURL(file) + '" alt="">';
    }

    function updateEditSlugPreview() {
      const raw = document.getElementById('editCardSlug').value.trim();
      const slug = sanitizeSlug(raw) || '...';
      document.getElementById('editSlugUrl').textContent = window.location.origin + '/c/' + slug;
    }

    async function saveEditCard() {
      if (!editingCard) return;

      const price = Math.round(parseFloat(document.getElementById('editCardPrice').value) * 100);
      if (!price || price < 100) return showToast('Minimum price: €1', 'error');

      const rawSlug = document.getElementById('editCardSlug').value.trim();
      const slug = rawSlug ? sanitizeSlug(rawSlug) : editingCard.slug;
      if (!slug) return showToast('Invalid link', 'error');

      // Check slug uniqueness if changed
      if (slug !== editingCard.slug) {
        const { data: existing } = await sb.from('cards').select('id').eq('slug', slug).maybeSingle();
        if (existing) return showToast('This link is already taken', 'error');
      }

      const btn = document.getElementById('btnSaveEdit');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const updates = {
          title: document.getElementById('editCardTitle').value.trim() || null,
          price: price,
          slug: slug,
        };

        // Upload new media if selected
        if (editSelectedFile) {
          const ext = editSelectedFile.name.split('.').pop().toLowerCase();
          const mediaType = editSelectedFile.type.startsWith('video/') ? 'video' : 'image';
          const filePath = currentUser.id + '/' + Date.now() + '.' + ext;
          const { error: uploadErr } = await sb.storage.from('media').upload(filePath, editSelectedFile, { cacheControl: '3600', upsert: false });
          if (uploadErr) throw uploadErr;
          const { data: urlData } = sb.storage.from('media').getPublicUrl(filePath);
          updates.media_url = urlData.publicUrl;
          updates.media_type = mediaType;
        }

        // Upload new avatar if selected
        if (editSelectedAvatar) {
          const avatarExt = editSelectedAvatar.name.split('.').pop().toLowerCase();
          const avatarPath = currentUser.id + '/avatar-' + Date.now() + '.' + avatarExt;
          const { error: avatarErr } = await sb.storage.from('media').upload(avatarPath, editSelectedAvatar, { cacheControl: '3600', upsert: false });
          if (avatarErr) throw avatarErr;
          const { data: avatarData } = sb.storage.from('media').getPublicUrl(avatarPath);
          updates.avatar_url = avatarData.publicUrl;
        }

        const { error: updateErr } = await sb.from('cards').update(updates).eq('id', editingCard.id);
        if (updateErr) throw updateErr;

        closeEditModal();
        showToast('Card updated!', 'success');
        await loadCards();
        renderCards();
      } catch (err) {
        console.error('Edit card error:', err);
        showToast('Error: ' + (err.message || 'Failed'), 'error');
        btn.disabled = false;
        btn.textContent = 'Save';
      }
    }

    // ========== INIT ==========
    init();
  </script>
</body>
</html>
