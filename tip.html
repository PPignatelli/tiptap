<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TipsTap — Contenu exclusif</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23FF6B35'/><text x='50' y='70' font-size='52' text-anchor='middle' fill='white' font-family='system-ui' font-weight='800'>T</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-system.css">
  <script>
    (function(){
      var t = localStorage.getItem('tipstap-theme') ||
        (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    body {
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: var(--color-surface-subtle);
    }

    .card-container {
      width: 100%; max-width: 420px;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    /* Media area with blur */
    .media-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #000;
    }
    .media-wrapper img,
    .media-wrapper video {
      width: 100%; height: 100%; object-fit: cover;
      filter: blur(28px) brightness(0.7);
      transform: scale(1.15); /* avoid blur edge artifacts */
    }
    .media-lock {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; text-align: center; gap: 8px;
    }
    .media-lock svg { width: 48px; height: 48px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
    .media-lock p {
      font-size: 15px; font-weight: 600;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* Revealed state */
    .media-wrapper.revealed img,
    .media-wrapper.revealed video {
      filter: none;
      transform: none;
      transition: filter 0.6s ease, transform 0.6s ease;
    }
    .media-wrapper.revealed .media-lock { display: none; }

    /* Avatar on card */
    .card-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--color-surface);
      margin: -32px auto 0; position: relative; z-index: 2;
      display: block; box-shadow: var(--shadow-md);
      background: var(--color-surface-inset);
    }

    /* Card body */
    .card-body {
      padding: 24px; text-align: center;
    }
    .card-body.no-avatar { padding-top: 24px; }
    .card-body.has-avatar { padding-top: 12px; }
    .card-title {
      font-size: 18px; font-weight: 700;
      margin-bottom: 4px;
    }
    .card-price-row {
      display: flex; align-items: baseline; gap: 6px;
      margin-bottom: 24px;
    }
    .card-price {
      font-size: 28px; font-weight: 800; color: var(--brand);
    }
    .card-price-label {
      font-size: 14px; color: var(--color-text-secondary);
    }

    /* Pay buttons */
    .pay-buttons { display: flex; flex-direction: column; gap: 12px; }

    .btn-apple-pay, .btn-google-pay {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all var(--duration);
      letter-spacing: -0.2px;
    }

    .btn-apple-pay {
      background: #000; color: #fff;
    }
    .btn-apple-pay:hover { background: #1a1a1a; }
    [data-theme="dark"] .btn-apple-pay { background: #fff; color: #000; }
    [data-theme="dark"] .btn-apple-pay:hover { background: #e5e5e5; }

    .btn-google-pay {
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .btn-google-pay:hover { background: var(--color-surface-inset); }

    .btn-apple-pay svg, .btn-google-pay svg { height: 20px; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
      color: var(--color-text-tertiary); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--color-border);
    }

    .btn-card-pay {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
      background: var(--brand); color: white;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all var(--duration);
    }
    .btn-card-pay:hover { background: var(--brand-hover); }

    /* Success state */
    .success-msg {
      display: none; text-align: center; padding: 24px;
    }
    .success-msg.active { display: block; }
    .success-msg svg { width: 56px; height: 56px; color: var(--color-success); margin: 0 auto 12px; }
    .success-msg h3 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .success-msg p { color: var(--color-text-secondary); font-size: 14px; }

    /* Loading */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      min-height: 50vh; color: var(--color-text-tertiary);
    }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--color-border);
      border-top-color: var(--brand); border-radius: 50%;
      animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      text-align: center; padding: 60px 24px;
      color: var(--color-text-secondary);
    }
    .error-state h3 { color: var(--color-text); margin-bottom: 8px; }

    /* Footer */
    .card-footer {
      padding: 12px 24px 20px;
      text-align: center;
    }
    .card-footer a {
      font-size: 12px; color: var(--color-text-tertiary);
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .card-footer a:hover { color: var(--brand); }
    .card-footer svg { width: 14px; height: 14px; }

    @media (max-width: 440px) {
      body { padding: 0; }
      .card-container { border-radius: 0; min-height: 100dvh; box-shadow: none; }
    }
  </style>
</head>
<body>
  <!-- LOADING -->
  <div class="loading-state" id="loading"><div class="spinner"></div></div>

  <!-- ERROR -->
  <div class="error-state" id="errorState" style="display:none">
    <h3>Carte introuvable</h3>
    <p>Ce lien n'est pas valide ou la carte a été supprimée.</p>
  </div>

  <!-- CARD -->
  <div class="card-container" id="cardContainer" style="display:none">
    <!-- Media -->
    <div class="media-wrapper" id="mediaWrapper">
      <!-- Filled by JS -->
      <div class="media-lock">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <p>Contenu verrouillé</p>
      </div>
    </div>

    <!-- Avatar (inserted by JS if exists) -->
    <img class="card-avatar" id="cardAvatar" style="display:none" alt="">

    <!-- Body -->
    <div class="card-body no-avatar" id="cardBody">
      <div class="card-title" id="cardTitle"></div>
      <div class="card-price-row">
        <span class="card-price" id="cardPrice"></span>
        <span class="card-price-label">pour débloquer</span>
      </div>

      <div class="pay-buttons" id="payButtons">
        <!-- Apple Pay -->
        <button class="btn-apple-pay" onclick="handlePay('apple')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.52-3.23 0-1.44.62-2.2.44-3.06-.4C3.79 16.17 4.36 9.43 8.7 9.17c1.23.06 2.09.7 2.81.73.99-.2 1.93-.77 2.98-.7 1.27.1 2.22.6 2.84 1.53-2.6 1.54-1.98 4.94.37 5.89-.46 1.2-1.07 2.38-2.14 3.55l1.49.11zM12.03 9.12c-.13-2.27 1.72-4.14 3.92-4.32.28 2.52-2.28 4.43-3.92 4.32z"/></svg>
          Apple Pay
        </button>

        <!-- Google Pay -->
        <button class="btn-google-pay" onclick="handlePay('google')">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google Pay
        </button>

        <div class="divider">ou</div>

        <!-- Card pay -->
        <button class="btn-card-pay" onclick="handlePay('card')">
          Payer par carte
        </button>
      </div>

      <!-- Success -->
      <div class="success-msg" id="successMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
        <h3>Contenu débloqué !</h3>
        <p>Merci pour votre achat.</p>
      </div>
    </div>

    <div class="card-footer">
      <a href="/index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Propulsé par TipsTap
      </a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- SUPABASE + STRIPE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <script>
    const SUPABASE_URL = 'https://iuzylqpixymphydjmkeo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1enlscXBpeHltcGh5ZGpta2VvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0OTg5NzEsImV4cCI6MjA4NzA3NDk3MX0.eIpFzw9w5qTQSixdw7_02fQLnsaz-DSa7dc74kfIE6o';
    const STRIPE_PK = 'pk_live_51T2XpjPj8CUDpYIXeN9lbus9BihRZBjYaJTwJOKYnZWx4bm5H75jnFilgS9TEuVVM9oungJWpwCyCmdLQ5p8RCPv001YZFMv38';
    const EDGE_FN_URL = SUPABASE_URL + '/functions/v1';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let card = null;

    // ========== LOAD CARD ==========
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('c');
      if (!slug) { showError(); return; }

      try {
        const { data, error } = await sb.from('cards').select('*').eq('slug', slug).single();
        if (error || !data) { showError(); return; }
        card = data;
        renderCard();
      } catch (err) {
        console.error(err);
        showError();
      }
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
    }

    function renderCard() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('cardContainer').style.display = 'block';

      // Avatar
      if (card.avatar_url) {
        const avatar = document.getElementById('cardAvatar');
        avatar.src = card.avatar_url;
        avatar.style.display = 'block';
        document.getElementById('cardBody').classList.remove('no-avatar');
        document.getElementById('cardBody').classList.add('has-avatar');
      }

      // Title
      document.getElementById('cardTitle').textContent = card.title || 'Contenu exclusif';

      // Price
      const priceEur = (card.price / 100).toFixed(2).replace('.', ',');
      document.getElementById('cardPrice').textContent = priceEur + ' €';

      // Media
      const wrapper = document.getElementById('mediaWrapper');
      if (card.media_type === 'video') {
        const vid = document.createElement('video');
        vid.src = card.media_url;
        vid.muted = true; vid.autoplay = true; vid.loop = true; vid.playsInline = true;
        wrapper.insertBefore(vid, wrapper.firstChild);
      } else {
        const img = document.createElement('img');
        img.src = card.media_url;
        img.alt = card.title || '';
        wrapper.insertBefore(img, wrapper.firstChild);
      }
    }

    // ========== PAY ==========
    async function handlePay(method) {
      // For now, simulate payment success
      // TODO: integrate Stripe PaymentIntent + Apple Pay / Google Pay via Payment Request API
      const buttons = document.getElementById('payButtons');
      buttons.innerHTML = '<div style="text-align:center;padding:16px;color:var(--color-text-secondary)"><div class="spinner" style="margin:0 auto 12px"></div>Paiement en cours...</div>';

      try {
        // Simulate payment delay
        await new Promise(r => setTimeout(r, 1500));

        // Reveal content
        document.getElementById('mediaWrapper').classList.add('revealed');
        buttons.style.display = 'none';
        document.getElementById('successMsg').classList.add('active');
        showToast('Paiement réussi !', 'success');
      } catch (err) {
        showToast('Erreur de paiement', 'error');
        buttons.innerHTML = '<button class="btn-card-pay" onclick="handlePay(\'card\')">Réessayer</button>';
      }
    }

    // ========== UTILS ==========
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast visible ' + type;
      setTimeout(() => t.classList.remove('visible'), 3000);
    }

    init();
  </script>
</body>
</html>
