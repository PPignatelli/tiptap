<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — TipsTap</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FF6B35'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>T</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-system.css">
  <script>
    (function(){
      var t = localStorage.getItem('tipstap-theme') ||
        (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    body {
      min-height: 100dvh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px;
      background: var(--color-surface-subtle);
    }
    .card {
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 40px 32px; max-width: 420px; width: 100%;
      box-shadow: var(--shadow-lg);
    }
    .logo-wrap {
      text-align: center; margin-bottom: 32px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .logo-wordmark {
      font-size: 22px; font-weight: 800; color: var(--color-text);
    }
    .logo-wordmark span { color: var(--brand); }
    h1 {
      font-size: 22px; font-weight: 700; margin-bottom: 8px; text-align: center;
      color: var(--color-text);
    }
    .subtitle {
      font-size: 14px; color: var(--color-text-secondary); text-align: center; margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--color-text-secondary); margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--color-border); border-radius: var(--radius-sm);
      font-size: 15px; outline: none; font-family: inherit;
      transition: border-color var(--duration);
      background: var(--color-surface);
      color: var(--color-text);
    }
    .form-group input::placeholder { color: var(--color-text-tertiary); }
    .form-group input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-glow);
    }
    .btn {
      width: 100%; padding: 14px; border-radius: var(--radius-sm);
      background: var(--brand); color: white; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background var(--duration); margin-top: 8px;
    }
    .btn:hover { background: var(--brand-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: var(--color-error-light); color: var(--color-error);
      padding: 12px 16px; border-radius: var(--radius-sm);
      font-size: 13px; margin-bottom: 16px;
      display: none; border: 1px solid var(--color-error);
    }
    .error-msg.visible { display: block; }
    .success-state {
      text-align: center; display: none;
    }
    .success-state.visible { display: block; }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--color-success-light); margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .success-icon svg { width: 32px; height: 32px; color: var(--color-success); }
    .success-state h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--color-text); }
    .success-state p { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-wordmark">Tips<span>Tap</span></div>
    </div>

    <!-- FORM -->
    <div id="formState">
      <h1>Nouveau mot de passe</h1>
      <p class="subtitle">Choisissez un nouveau mot de passe pour votre compte.</p>
      <div class="error-msg" id="errorMsg"></div>
      <form onsubmit="handleReset(event)">
        <div class="form-group">
          <label for="newPassword">Nouveau mot de passe</label>
          <input type="password" id="newPassword" placeholder="Min. 6 caract&egrave;res" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <input type="password" id="confirmPassword" placeholder="Retapez le mot de passe" minlength="6" required>
        </div>
        <button type="submit" class="btn" id="resetBtn">Mettre &agrave; jour</button>
      </form>
    </div>

    <!-- SUCCESS -->
    <div class="success-state" id="successState">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2>Mot de passe mis &agrave; jour</h2>
      <p>Votre mot de passe a &eacute;t&eacute; chang&eacute; avec succ&egrave;s.</p>
      <a href="/dashboard.html" class="btn" style="display:inline-block;text-decoration:none;">Acc&eacute;der au dashboard</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://iuzylqpixymphydjmkeo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1enlscXBpeHltcGh5ZGpta2VvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0OTg5NzEsImV4cCI6MjA4NzA3NDk3MX0.eIpFzw9w5qTQSixdw7_02fQLnsaz-DSa7dc74kfIE6o';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('resetBtn');
      const pw = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (pw !== confirm) return showError('Les mots de passe ne correspondent pas.');
      if (pw.length < 6) return showError('Le mot de passe doit faire au moins 6 caractères.');

      btn.disabled = true;
      btn.textContent = 'Mise à jour...';
      document.getElementById('errorMsg').classList.remove('visible');

      const { error } = await sb.auth.updateUser({ password: pw });

      if (error) {
        btn.disabled = false;
        btn.textContent = 'Mettre à jour';
        return showError(error.message);
      }

      document.getElementById('formState').style.display = 'none';
      document.getElementById('successState').classList.add('visible');
    }
  </script>
</body>
</html>
